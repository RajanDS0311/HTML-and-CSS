<!DOCTYPE html>
<html>
<head>
    <title>My First GUI Page</title>
</head>

<body>

    <h2><u>Email Registration Form</u></h2>

    <form>
        <table cellpadding="8">

            <tr>
                <td><b>First Name :</b></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td><b>Last Name :</b></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td><b>Gender :</b></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                    <input type="radio" name="gender"> Other
                </td>
            </tr>

            <tr>
                <td><b>Address :</b></td> 
                <td>
                    <input type="text"> 
                </td>
            </tr>

            <tr>
                <td><b>Nationality :</b></td>
                <td>
                    <select>
                        <option>India</option>
                        <option>USA</option>
                        <option>Pakistan</option>
                        <option>Sri Lanka</option>
                        <option>England</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><b>DOB :</b></td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td><b>User ID :</b></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td><b>Password :</b></td>
                <td><input type="password" minlength="8"></td>
            </tr>

            <tr>
                <td><b>Photo :</b></td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td><b>Hobbies :</b></td>
                <td>
                    <input type="checkbox"> Football
                    <input type="checkbox"> Instagram
                    <input type="checkbox"> Programming
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="checkbox">
                    I accept all the Terms and Conditions.
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>

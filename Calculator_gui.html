<!DOCTYPE html>
<html>
    <head>
        <title>
            Calculator with GUi
        </title>
    </head>
<body bgcolor="lightblue"><center>
    <h2>Basic Calculator</h2>
<form>
    <table border="2" cellpadding = "10">

    <tr>
    <td  colspan = "4" bgcolor="darkblue"><input type="text" size="25" value="0"></td>
    </tr>

    <tr>
    <td bgcolor="pink"><input type="button" value="C"></td>
    <td bgcolor="yellow"><input type="button" value="<-"></td>
    <td bgcolor="purple"><input type="button" value="%"></td>
    <td bgcolor="lightgreen"><input type="button" value="/"></td>
    </tr>

    <tr>
    <td bgcolor="pink"><input type="button" value="7"></td>
    <td bgcolor="yellow"><input type="button" value="8"></td>
    <td bgcolor="purple"><input type="button" value="9"></td>
    <td bgcolor="lightgreen"><input type="button" value="*"></td>
    </tr>

    <tr>
    <td bgcolor="pink"><input type="button" value="4"></td>
    <td bgcolor="yellow"><input type="button" value="5"></td>
    <td bgcolor="purple"><input type="button" value="6"></td>
    <td bgcolor="lightgreen"><input type="button" value="-"></td>
    </tr>

    <tr>
    <td bgcolor="pink"><input type="button" value="1"></td>
    <td bgcolor="yellow"><input type="button" value="2"></td>
    <td bgcolor="purple"><input type="button" value="3"></td>
    <td bgcolor="lightgreen"><input type="button" value="+"></td>
    </tr>

    
    <tr>
    <td bgcolor="pink"><input type="button" value="00"></td>
    <td bgcolor="yellow"><input type="button" value="0"></td>
    <td bgcolor="purple"><input type="button" value="."></td>
    <td bgcolor="lightgreen"><input type="button" value="="></td>
    </tr>


</table>
</form><br>
<a href = "GUI.html"> Go back to GUi</a>
</center>
</body>
</html>
